name: Deploy to Windows

on:
  push:
    branches: [main]
  workflow_dispatch:  # кнопка ручного запуска на GitHub

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restart services
        shell: cmd
        run: |
          powershell -ExecutionPolicy Bypass -Command "docker compose pull --quiet"
          powershell -ExecutionPolicy Bypass -Command "docker compose up -d --build --remove-orphans"
          powershell -ExecutionPolicy Bypass -Command "docker compose ps"
